      - npm:    "@ogenticai/audit"
      - pypi:   "ogentic-audit"
      - crates: "ogentic-audit"
      - homebrew: "ogentic-audit-cli"
    builder_agents:
      - rust-builder
      - backend-builder-typescript
      - backend-builder-python
      - security-reviewer
      - library-publisher
    factory_notes: |
      Currently shipping CLI + library + Tauri/desktop integration in
      parallel. The factory's release-manager + library-publisher should
      coordinate the multi-target publish (npm + PyPI + crates + Homebrew).

  # ─── Sotto Desktop — Tauri app, heavy build ─────────────────────────────
