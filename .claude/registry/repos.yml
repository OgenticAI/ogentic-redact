  - "Linear team / label prefixes ADR, WAVE, DSM, LAYER are visible in PR titles alongside OGE. Are these separate Linear teams, or workspace-level labels? The Cross-Repo Coordinator needs to know what to track."
  - "Is `agent-dealsizer` the canonical Sizer agent for all future client sizing engagements, or do new clients get their own forks?"
  - "Where will Wave-2 OSS repos (ogentic-router, ogentic-redact, ogentic-converter, ogentic-adapter-sdk) live? Same OgenticAI org, same naming, or different?"
  - "Where will Therapy Vertical live — inside the `sotto` repo or a new `sotto-therapy` repo?"
