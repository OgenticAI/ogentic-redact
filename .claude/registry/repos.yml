# OgenticAI multi-repo registry — grounded in BOTH Linear and GitHub (2026-05-29).
#
# 16 real repos, all under github.com/OgenticAI/, evidenced by ≥1 merged PR
# in the last 60 days.  Source: linear.list_diffs (253 PRs across two pages).
#
# Naming convention seen in practice (not the kebab I guessed earlier):
#   - agent-<thing>      → internal agents (agent-reviewer, agent-dealsizer, ...)
#   - agentcovenant      → one outlier (no separator)
#   - ai-assessment      → one outlier (no "agent-" prefix)
#   - ogentic-<thing>    → OSS libs (ogentic-shield, ogentic-audit)
#   - product names      → sotto, sotto-desktop, zashboard-ultimate
#
# Canonical OgenticAI stack (evidenced by "canonical stack migration" PRs
# in ai-assessment, asset-intelligence-hub, ogentic-secure-ai):
#   Next.js  +  Prisma  +  BetterAuth  +  Postgres
#   + HMAC audit chain (Ogentic-Audit)
#   + tenant isolation middleware
#
# Linear → GitHub linkage convention (evidenced by 79% of PR titles):
#   Commit-message prefix: `feat(OGE-398): ...`, `fix(OGE-394): ...`, etc.
#   NOT Linear's native PR linker (0/253 PRs use `linkedIssues`).
#
# Linear team prefixes seen in titles/branches:
#   OGE (primary), ADR (architecture decisions?), WAVE (OSS waves?), DSM, LAYER
#   → Confirm what ADR/WAVE/DSM/LAYER refer to.

version: 3
workspace: ogenticai-linear
linear_team: OGE
github_org: OgenticAI
canonical_stack:
  frontend: nextjs
  backend: nextjs-route-handlers
  orm: prisma
  auth: betterauth
  database: postgres
  audit: ogentic-audit
linkage:
  pr_to_linear: commit-message-prefix    # "feat(OGE-NNN): ..."  not native linker
  branch_convention: feature-style       # not Linear's auto-generated branch

# ──────────────────────────────────────────────────────────────────────────
# REPOS — sorted by recent PR activity (May 2026 default ordering)
# ──────────────────────────────────────────────────────────────────────────

repos:

  # ─── most active: the PR reviewer itself ─────────────────────────────────
  - name: agent-reviewer
    kind: platform-tool
    linear_project: OgenticAI Reviewer
    priority: high
    status: active                              # NOT "completed" — 24 recent PRs
    url: git@github.com:OgenticAI/agent-reviewer.git
    description: |
      The "lives in GitHub" AI reviewer that audits PRs against linked Linear
      ticket UAT checklists and blocks merge on fail. Itself under active
      development — currently hardening sweep (chaos runbook, diagnostic
      logging on auto-patch step, Checks-vs-Statuses API handling).
    stacks: [typescript, nodejs]
    recent_prs: 24
    sample_titles:
      - "fix(OGE-395): diagnostic logging on auto-patch step"
      - "fix(OGE-394): isCiGreen reads both Checks and Statuses APIs"
      - "docs(OGE-391): chaos runbook from hardening sweep"
    factory_notes: |
      This is the agent the factory must INTEGRATE WITH, not duplicate. The
      factory's validator + security-reviewer run BEFORE PR open; agent-reviewer
      runs ON PR open. Same UAT-checklist source (the Linear ticket).
      The "chore: install OgenticAI Reviewer (UAT-checklist gate)" pattern
      seen across many agent-* repos is the rollout of this reviewer to each
      repo — keep doing that, the factory doesn't replace it.

  # ─── client engagement that doubles as a product ────────────────────────
  - name: agent-dealsizer
    kind: client-engagement-and-product
    linear_project: Sizer AI (Revere Capital)
    serves_clients: [Revere Capital]
    priority: high
    url: git@github.com:OgenticAI/agent-dealsizer.git
    description: |
      Deal Sizer agent. Currently the MOST active repo overall (40 recent PRs).
      Originally a Revere engagement; appears to be the canonical sizer for
      future client sizing engagements too.
    stacks: [nextjs, typescript, prisma, betterauth]
    recent_prs: 40
    sample_titles:
