name: Bug report
description: Something is broken or behaving unexpectedly.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Security findings belong in email, not issues.** See [SECURITY.md](../../SECURITY.md).
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal code or command sequence that reproduces the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Commit SHA or release tag (e.g. `v0.1.0` or `a1b2c3d`).
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / platform
      description: e.g. macOS 14.5, Ubuntu 22.04
