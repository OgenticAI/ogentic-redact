name: Release

# OGE-1289: v0.1 GA — publish to crates.io, PyPI, npm, and GitHub Release with
# signed artifacts. Applies audit D3 lessons:
#   - verify crates.io account email BEFORE the publish run
#   - no macos-13 runner in the wheel matrix (use macos-14 + cross-compile)

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write      # create GitHub Release
  id-token: write      # OIDC for PyPI trusted publishing + GitHub Attestations
  attestations: write  # artifact attestation storage

jobs:
  # ── Pre-flight (audit D3: verify crates.io email before any publish) ───────────
  preflight:
    name: "Pre-flight: verify crates.io email + parse version"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.parse.outputs.version }}

    steps:
      - name: Parse version from tag
        id: parse
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing v$VERSION"

      # Audit D3 lesson: confirm crates.io account email is verified before
      # attempting to publish. Publishing with an unverified email fails silently
      # mid-run and leaves crates in a partially-published state.
      - name: Verify crates.io account email is confirmed
        env:
          CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          RESPONSE=$(curl -sf \
            -H "Authorization: Bearer $CRATES_IO_TOKEN" \
            -H "Accept: application/json" \
            https://crates.io/api/v1/me)
          EMAIL_VERIFIED=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['user']['email_verified'])")
          if [ "$EMAIL_VERIFIED" != "True" ]; then
            echo "::error::crates.io account email is NOT verified."
            echo "Visit https://crates.io/settings/profile and verify your email before releasing."
            echo "(Audit D3 lesson: ogentic-audit release was blocked by this exact issue.)"
            exit 1
          fi
          echo "crates.io email verified — safe to publish."

  # ── Build Python wheels ────────────────────────────────────────────────────────
  build-wheels:
    name: "Build wheel — ${{ matrix.target }}"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    needs: preflight

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (manylinux)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: auto

          # Linux arm64 (manylinux, cross-compile)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: auto

          # macOS arm64 — macos-14 (M1); no macos-13 (audit D3 lesson)
          - os: macos-14
            target: aarch64-apple-darwin
            manylinux: ''

          # macOS x86_64 — cross-compile from macos-14; avoids deprecated macos-13
          - os: macos-14
            target: x86_64-apple-darwin
            manylinux: ''

          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: ''

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels (maturin-action)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          command: build
          args: --release --out dist --find-interpreter
          manylinux: ${{ matrix.manylinux || 'off' }}
          sccache: 'true'

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  # ── Build Node.js native bindings ─────────────────────────────────────────────
  build-node:
    name: "Build node — ${{ matrix.target }}"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs: preflight

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            node-file: ogentic-redact.linux-x64-gnu.node

          # macOS arm64 — macos-14; no macos-13 (audit D3 lesson)
          - os: macos-14
            target: aarch64-apple-darwin
            node-file: ogentic-redact.darwin-arm64.node

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            node-file: ogentic-redact.win32-x64-msvc.node

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install @napi-rs/cli
        run: npm install -g @napi-rs/cli@2

      - name: Build native binding
        working-directory: packages/ogentic-redact-node
        run: napi build --platform --release --target ${{ matrix.target }}

      - name: Upload node artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.target }}
          path: packages/ogentic-redact-node/${{ matrix.node-file }}
          if-no-files-found: error

  # ── Publish Rust crates to crates.io ──────────────────────────────────────────
  publish-crates:
    name: "Publish crates to crates.io"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: preflight

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      # Publish in dependency order: core → rules → cli (each waits for indexing)
      - name: Publish ogentic-redact-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish -p ogentic-redact-core

      - name: Wait for crates.io indexing (core)
        run: sleep 30

      - name: Publish ogentic-redact-rules
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish -p ogentic-redact-rules

      - name: Wait for crates.io indexing (rules)
        run: sleep 30

      - name: Publish ogentic-redact (CLI)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish -p ogentic-redact

  # ── Publish Python wheels to PyPI ─────────────────────────────────────────────
  publish-pypi:
    name: "Publish to PyPI"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-wheels
    environment:
      name: pypi
      url: https://pypi.org/project/ogentic-redact/

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: false

  # ── Publish npm packages ───────────────────────────────────────────────────────
  publish-npm:
    name: "Publish to npm"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-node

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install @napi-rs/cli
        run: npm install -g @napi-rs/cli@2

      - name: Download all node artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: node-*
          path: packages/ogentic-redact-node/artifacts/
          merge-multiple: true

      - name: Move artifacts into platform package directories
        working-directory: packages/ogentic-redact-node
        run: napi artifacts

      - name: Publish platform packages
        working-directory: packages/ogentic-redact-node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in npm/*/; do
            echo "Publishing $dir..."
            npm publish "$dir" --access public
          done

      - name: Publish main @ogenticai/redact package
        working-directory: packages/ogentic-redact-node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  # ── Create signed GitHub Release ──────────────────────────────────────────────
  github-release:
    name: "Create GitHub Release"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [publish-crates, publish-pypi, publish-npm]

    steps:
      - uses: actions/checkout@v4

      - name: Parse version from tag
        id: parse
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: release-artifacts/wheels/
          merge-multiple: true

      - name: Download all node artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: node-*
          path: release-artifacts/node/
          merge-multiple: true

      - name: Generate SHA-256 checksums
        working-directory: release-artifacts
        run: |
          find . -type f | sort | xargs sha256sum > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Sign artifacts with GitHub Attestations
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            release-artifacts/wheels/*.whl
            release-artifacts/node/*.node
            release-artifacts/SHA256SUMS.txt

      - name: Extract CHANGELOG entry for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the section between the first [VERSION] header and the next [
          BODY=$(awk "/^## \[$VERSION\]/{ found=1; next } found && /^## \[/{ exit } found{ print }" CHANGELOG.md)
          # Write to file to avoid quoting issues
          echo "$BODY" > release-notes.md
          echo "Release notes:"
          cat release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            --title "v${VERSION}" \
            --notes-file release-notes.md \
            --verify-tag \
            release-artifacts/wheels/*.whl \
            release-artifacts/node/*.node \
            release-artifacts/SHA256SUMS.txt
